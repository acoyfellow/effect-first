name: Verify Restart

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  verify-restart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
      - run: npm run build
      - run: npm run experiment:verify
      - run: npm run examples:verify
